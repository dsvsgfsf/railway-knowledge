<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>教材书架 - 黑龙江交通职业技术学院</title>
<style>
:root {
  --primary: #1a365d;
  --secondary: #2c5282;
  --accent: #ed8936;
  --accent-light: #fbd38d;
  --bg: #f7fafc;
  --card-bg: #ffffff;
  --text: #2d3748;
  --text-light: #718096;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  min-height: 100vh;
  padding-bottom: 40px;
}
.header {
  background: rgba(255,255,255,0.95);
  padding: 30px 20px;
  text-align: center;
  box-shadow: var(--shadow);
}
.header h1 {
  font-size: 2em;
  color: var(--primary);
  margin-bottom: 8px;
}
.header p {
  color: var(--text-light);
  font-size: 0.95em;
}
.school-badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75em;
  margin-bottom: 10px;
}
.stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  flex-wrap: wrap;
}
.stat-box {
  background: rgba(255,255,255,0.95);
  padding: 15px 30px;
  border-radius: 12px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-box .num {
  font-size: 2em;
  font-weight: bold;
  color: var(--accent);
}
.stat-box .label {
  font-size: 0.85em;
  color: var(--text-light);
}
.search-section {
  max-width: 800px;
  margin: 20px auto;
  padding: 0 20px;
}
.search-box {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: var(--shadow);
}
.search-box input {
  width: 100%;
  padding: 15px 20px;
  font-size: 1em;
  border: 2px solid var(--border);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.3s;
}
.search-box input:focus {
  border-color: var(--accent);
}
.filter-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 15px;
}
.filter-tab {
  padding: 8px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85em;
  color: var(--text-light);
  transition: all 0.3s;
}
.filter-tab:hover {
  background: var(--accent-light);
  color: var(--primary);
}
.filter-tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.books-grid {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}
.book-card {
  background: var(--card-bg);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}
.book-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 24px rgba(0,0,0,0.15);
}
.book-cover {
  width: 100%;
  height: 200px;
  aspect-ratio: 3/4;
  position: relative;
  overflow: hidden;
}
.book-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.book-cover .placeholder {
  width: 100%;
  height: 100%;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 2.5em;
  color: white;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
.book-cover .placeholder .char {
  font-size: 2.8em;
  font-weight: bold;
  margin-bottom: 5px;
}
.book-cover .placeholder .title {
  font-size: 0.6em;
  opacity: 0.9;
  padding: 0 8px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}
.book-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--accent);
  color: white;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.65em;
  font-weight: bold;
}
.buy-actions {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.3s;
}
.book-card:hover .buy-actions {
  opacity: 1;
}
.buy-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid white;
}
.buy-btn:hover {
  transform: scale(1.15);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.buy-btn.jd {
  background: #E2231A;
}
.buy-btn.taobao {
  background: #FF5000;
}
.buy-btn.pdd {
  background: #E02E24;
}
.book-tag {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.65em;
}
.book-info {
  padding: 12px;
}
.book-title {
  font-size: 0.9em;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.book-author {
  font-size: 0.75em;
  color: var(--text-light);
}
.book-publisher {
  font-size: 0.7em;
  color: var(--text-light);
  margin-top: 2px;
}
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
  display: none;
}
.no-results.show {
  display: block;
}
.no-results h3 {
  font-size: 1.5em;
  margin-bottom: 10px;
}
/* Modal */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal.show {
  display: flex;
}
.modal-content {
  background: white;
  border-radius: 16px;
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 30px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  cursor: pointer;
  font-size: 1.2em;
  color: var(--text-light);
}
.modal-cover {
  width: 100%;
  height: 250px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-cover img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.modal-cover .placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 5em;
  color: white;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
}
.modal-cover .placeholder .char {
  font-size: 1.5em;
  font-weight: bold;
  margin-bottom: 10px;
}
.modal-cover .placeholder .title {
  font-size: 0.4em;
  opacity: 0.9;
  padding: 0 20px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}
.modal h2 {
  color: var(--primary);
  margin-bottom: 15px;
  font-size: 1.4em;
}
.modal-meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.meta-item {
  background: var(--bg);
  padding: 10px;
  border-radius: 8px;
}
.meta-item .label {
  font-size: 0.75em;
  color: var(--text-light);
  margin-bottom: 3px;
}
.meta-item .value {
  font-size: 0.9em;
  color: var(--text);
  font-weight: 500;
}
.modal-desc {
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 20px;
  font-size: 0.95em;
}
.modal-actions {
  display: flex;
  gap: 10px;
}
.modal-btn {
  flex: 1;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  font-size: 0.9em;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.3s;
  text-decoration: none;
  display: inline-block;
  text-align: center;
}
.modal-btn:hover {
  opacity: 0.85;
}
.modal-btn.primary {
  background: var(--accent);
  color: white;
}
.modal-btn.secondary {
  background: var(--bg);
  color: var(--text);
}
.footer {
  text-align: center;
  padding: 30px;
  color: rgba(255,255,255,0.8);
  font-size: 0.85em;
}
</style>
</head>

</div>

<div class="footer">

var majors = ['全部'];
var publishers = {};
var currentMajor = '全部';
var searchTerm = '';

// 统计专业和出版社
books.forEach(function(b) {
  if (majors.indexOf(b.major) === -1) {
    majors.push(b.major);
  }
  publishers[b.publisher] = true;
});

function init() {
  document.getElementById('totalBooks').textContent = books.length;
  document.getElementById('totalMajors').textContent = majors.length - 1;
  document.getElementById('totalPublishers').textContent = Object.keys(publishers).length;
  
  // 生成专业筛选标签
  var tabsContainer = document.getElementById('filterTabs');
  var tabsHtml = '';
  majors.forEach(function(m) {
    var active = m === '全部' ? 'active' : '';
    tabsHtml += '<div class="filter-tab ' + active + '" onclick="filterByMajor(\'' + m + '\')">' + m + '</div>';
  });
  tabsContainer.innerHTML = tabsHtml;
  
  renderBooks();
}

function filterByMajor(major) {
  currentMajor = major;
  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.textContent === major);
  });
  renderBooks();
}

function searchBooks(val) {
  searchTerm = val.trim().toLowerCase();
  renderBooks();
}

function renderBooks() {
  var grid = document.getElementById('booksGrid');
  var noResults = document.getElementById('noResults');
  
  var filtered = books.filter(function(b) {
    if (currentMajor !== '全部' && b.major !== currentMajor) return false;
    if (searchTerm) {
      return b.title.toLowerCase().indexOf(searchTerm) !== -1 ||
             b.author.toLowerCase().indexOf(searchTerm) !== -1 ||
             b.isbn.indexOf(searchTerm) !== -1;
    }
    return true;
  });
  
  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.classList.add('show');
    return;
  }
  noResults.classList.remove('show');
  
  var colors = {
    '铁道机车运用与维护': '#e74c3c',
    '铁道车辆技术': '#3498db',
    '动车组检修技术': '#9b59b6',
    '铁道信号自动控制': '#f39c12',
    '铁道通信与信息化技术': '#1abc9c',
    '铁道交通运营管理': '#e67e22',
    '铁道工程技术': '#27ae60',
    '铁道供电技术': '#d35400',
    '高速铁路施工与维护': '#2980b9',
    '铁道桥梁隧道工程技术': '#8e44ad',
    '公共基础课': '#34495e'
  };
  
  var html = '';
  filtered.forEach(function(b, i) {
    var color = colors[b.major] || '#666';
    // 获取书名第一个字符
    var firstChar = b.title.charAt(0);
    var shortTitle = b.title.length > 8 ? b.title.substring(0, 8) + '...' : b.title;
    
    var coverHtml;
    if (b.cover && b.cover.trim() !== '') {
      coverHtml = '<img src="' + b.cover + '" alt="' + b.title + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div class=placeholder style=background:linear-gradient(135deg,' + color + ',#222)><div class=char>' + firstChar + '</div><div class=title>' + shortTitle + '</div></div>\'">';
    } else {
      coverHtml = '<div class="placeholder" style="background:linear-gradient(135deg,' + color + ',#222)"><div class="char">' + firstChar + '</div><div class="title">' + shortTitle + '</div></div>';
    }
    
    // 购买链接
    var searchKeyword = encodeURIComponent(b.title + ' ' + b.isbn);
    var jdLink = 'https://search.jd.com/Search?key=' + searchKeyword;
    var taobaoLink = 'https://s.taobao.com/search?q=' + searchKeyword;
    var pddLink = 'https://mobile.yangkeduo.com/search_result.html?search_key=' + searchKeyword;
    
    html += '<div class="book-card" onclick="openModal(' + i + ')">' +
      '<div class="book-cover">' + coverHtml +
      '<span class="book-badge">¥' + b.price + '</span>' +
      '<div class="buy-actions">' +
      '<a href="' + jdLink + '" target="_blank" class="buy-btn jd" onclick="event.stopPropagation();" title="京东购买">🛒</a>' +
      '<a href="' + taobaoLink + '" target="_blank" class="buy-btn taobao" onclick="event.stopPropagation();" title="淘宝购买">🛍️</a>' +
      '<a href="' + pddLink + '" target="_blank" class="buy-btn pdd" onclick="event.stopPropagation();" title="拼多多购买">📦</a>' +
      '</div>' +
      '</div>' +
      '<div class="book-info">' +
      '<div class="book-title">' + b.title + '</div>' +
      '<div class="book-author">' + b.author + '</div>' +
      '<div class="book-publisher">' + b.publisher + '</div>' +
      '</div></div>';
  });
  grid.innerHTML = html;
}

function openModal(index) {
  var b = books[index];
  var modal = document.getElementById('bookModal');
  
  var colors = {
    '铁道机车运用与维护': '#e74c3c',
    '铁道车辆技术': '#3498db',
    '动车组检修技术': '#9b59b6',
    '铁道信号自动控制': '#f39c12',
    '铁道通信与信息化技术': '#1abc9c',
    '铁道交通运营管理': '#e67e22',
    '铁道工程技术': '#27ae60',
    '铁道供电技术': '#d35400',
    '高速铁路施工与维护': '#2980b9',
    '铁道桥梁隧道工程技术': '#8e44ad',
    '公共基础课': '#34495e'
  };
  var color = colors[b.major] || '#666';
  // 获取书名第一个字符
  var firstChar = b.title.charAt(0);
  var shortTitle = b.title.length > 10 ? b.title.substring(0, 10) + '...' : b.title;
  
  var coverHtml;
  if (b.cover && b.cover.trim() !== '') {
    coverHtml = '<img src="' + b.cover + '" alt="' + b.title + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div class=placeholder style=background:linear-gradient(135deg,' + color + ',#222)><div class=char>' + firstChar + '</div><div class=title>' + shortTitle + '</div></div>\'">';
  } else {
    coverHtml = '<div class="placeholder" style="background:linear-gradient(135deg,' + color + ',#222)"><div class="char">' + firstChar + '</div><div class="title">' + shortTitle + '</div></div>';
  }
  
  document.getElementById('modalCover').innerHTML = coverHtml;
  document.getElementById('modalTitle').textContent = b.title;
  document.getElementById('modalMeta').innerHTML = 
    '<div class="meta-item"><div class="label">作者</div><div class="value">' + b.author + '</div></div>' +
    '<div class="meta-item"><div class="label">出版社</div><div class="value">' + b.publisher + '</div></div>' +
    '<div class="meta-item"><div class="label">ISBN</div><div class="value">' + b.isbn + '</div></div>' +
    '<div class="meta-item"><div class="label">定价</div><div class="value">¥' + b.price + '</div></div>' +
    '<div class="meta-item"><div class="label">年份</div><div class="value">' + b.year + '</div></div>' +
    '<div class="meta-item"><div class="label">专业方向</div><div class="value">' + b.major + '</div></div>';
  document.getElementById('modalDesc').textContent = b.desc;
  
  // 设置购买链接
  var searchKeyword = encodeURIComponent(b.title + ' ' + b.isbn);
  document.getElementById('jdBtn').href = 'https://search.jd.com/Search?key=' + searchKeyword;
  document.getElementById('taobaoBtn').href = 'https://s.taobao.com/search?q=' + searchKeyword;
  document.getElementById('pddBtn').href = 'https://mobile.yangkeduo.com/search_result.html?search_key=' + searchKeyword;
  
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('bookModal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('bookModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
