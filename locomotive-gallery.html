      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: #2c3e50;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      color: #7f8c8d;
      font-size: 14px;
    }

    .back-link {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      transition: transform 0.2s;
    }

    .back-link:hover {
      transform: translateY(-2px);
    }

    .filter-bar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .filter-btn {
      padding: 10px 20px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .filter-btn:hover {
      background: #667eea;
      color: white;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .locomotive-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      transition: all 0.3s;
    }

    .locomotive-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
    }

    .card-image {
      height: 220px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .locomotive-card:hover .card-image img {
      transform: scale(1.05);
    }

    .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      backdrop-filter: blur(10px);
    }

    .card-type-label {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      border-top: 3px solid #667eea;
    }

    .card-type-label.electric {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      border-top-color: #e74c3c;
    }

    .card-type-label.diesel {
      background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
      border-top-color: #27ae60;
    }

    .card-type-label.emu {
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      border-top-color: #3498db;
    }

    .card-type-label.special {
      background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
      border-top-color: #f39c12;
    }

    .card-info {
      padding: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    .card-nickname {
      display: inline-block;
      padding: 4px 12px;
      background: #fff3cd;
      border-radius: 12px;
      font-size: 12px;
      color: #856404;
      margin-bottom: 12px;
    }

    .card-specs {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .card-specs td {
      padding: 6px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .card-specs td:first-child {
      color: #667eea;
      font-weight: 600;
      white-space: nowrap;
      width: 40%;
    }

    .card-specs td:last-child {
      color: #2c3e50;
    }

    .no-image {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      opacity: 0.3;
    }

    .footer {
      text-align: center;
      padding: 30px;
      color: white;
      font-size: 14px;
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
      }

      .header h1 {
        font-size: 22px;
      }

      .filter-bar {
        justify-content: center;
      }
    }
  </style>

    // 渲染机车卡片
    function renderGallery(filter = 'all') {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      const filteredData = filter === 'all' 
        ? locomotiveData 
        : locomotiveData.filter(item => item.type === filter);

      filteredData.forEach(loco => {
        const card = document.createElement('div');
        card.className = 'locomotive-card';
        card.dataset.type = loco.type;

        // 根据类型选择样式类
        let typeClass = '';
        let typeLabel = '';
        switch(loco.type) {
          case 'electric':
            typeClass = 'electric';
            typeLabel = '⚡ 电力机车';
            break;
          case 'diesel':
            typeClass = 'diesel';
            typeLabel = '🛢️ 内燃机车';
            break;
          case 'emu':
            typeClass = 'emu';
            typeLabel = '🚄 动车组';
            break;
          case 'special':
            typeClass = 'special';
            typeLabel = '🔧 特种车辆';
            break;
        }

        card.innerHTML = `
          <div class="card-image">
            ${loco.image 
              ? `<img src="${loco.image}" alt="${loco.name}" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>🚂</div>'">`
              : '<div class="no-image">🚂</div>'
            }
            <div class="card-badge">📷 百度百科</div>
          </div>
          <div class="card-type-label ${typeClass}">
            ${typeLabel} · ${loco.category}
          </div>
          <div class="card-info">
            <div class="card-title">${loco.name}</div>
            ${loco.nickname ? `<div class="card-nickname">🌟 ${loco.nickname}</div>` : ''}
            <table class="card-specs">
              ${Object.entries(loco.specs).map(([k, v]) => `
                <tr>
                  <td>${k}</td>
                  <td>${v}</td>
                </tr>
              `).join('')}
            </table>
          </div>
        `;

        gallery.appendChild(card);
      });
    }

    // 筛选按钮事件
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderGallery(this.dataset.filter);
      });
    });

    // 初始渲染
    renderGallery();
