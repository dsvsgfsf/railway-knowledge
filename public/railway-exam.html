      transition: all .2s;

      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;

      padding: 24px;
      overflow-y: auto;

      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;

    .question-list { display: flex; flex-direction: column; gap: 12px; }
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all .2s;
    }
    .question-card.show {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }
    .question-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow);
    }
    .question-num {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .question-options { display: flex; flex-direction: column; gap: 6px; }
    .question-option {
      padding: 8px 12px;
      background: #f5f7fa;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .question-option:hover { background: #e8ecf4; }
    .question-option.selected { background: rgba(0,48,135,.1); border: 1px solid var(--primary); }

    .bureau-req {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .bureau-req h3 {
      font-size: 15px;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .bureau-req-table {
      width: 100%;

      font-size: 13px;
    }
    .bureau-req-table th {
      background: #f5f7fa;
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .bureau-req-table tr:last-child td { border-bottom: none; }
    
    /* Responsive */
    @media (max-width: 900px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; max-height: 40vh; }
    }

</head>

    {
      q: '铁路区间信号机柱的中心到线路中心的距离是多少？',
      a: '不小于2450mm',
      options: ['1500mm', '2000mm', '不小于2450mm', '3000mm']
    },
    {
      q: '列车运行中，遇有信号显示不明或无信号显示时，司机应如何处理？',
      a: '立即停车',
      options: ['减速运行', '立即停车', '加速通过', '继续运行等待通知']
    },
    {
      q: '铁路交通事故责任分为哪几类？',
      a: '全部责任、主要责任、重要责任、次要责任和同等责任',
      options: ['只有刑事责任', '全部责任、主要责任、重要责任、次要责任和同等责任', '只有民事责任', '全部责任和部分责任']
    },
    {
      q: '新建、改建铁路与既有道路交叉时，应由谁承担建设费用？',
      a: '铁路建设费用中包含',
      options: ['道路方承担', '铁路建设费用中包含', '双方各半', '视情况而定']
    },
    {
      q: '铁路道口的设置应经过哪个部门批准？',
      a: '铁路和当地政府共同批准',
      options: ['铁路部门单独批准', '铁路和当地政府共同批准', '地方政府批准', '不需要批准']
    }
  ]
};

let currentCategory = 'overview';

// 初始化
function init() {
  renderCategories();
  renderBureauRequirements();
  renderContent();
}

// 渲染分类
function renderCategories() {
  const container = document.getElementById('examCategories');
  let html = '';
  
  EXAM_CATEGORIES.forEach(cat => {
    const isActive = currentCategory === cat.id;
    html += `
      <div class="exam-cat ${isActive ? 'active' : ''}" onclick="selectCategory('${cat.id}')">
        <div class="exam-cat-icon" style="background:${cat.color}20;color:${cat.color}">
          ${cat.icon}
        </div>
        <div class="exam-cat-info">
          <div class="exam-cat-name">${cat.name}</div>
          <div class="exam-cat-desc">${cat.desc}</div>
        </div>
        <span class="exam-cat-count">${cat.questions}</span>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

// 选择分类
window.selectCategory = function(id) {
  currentCategory = id;
  renderCategories();
  renderContent();
};

// 渲染铁路局要求
function renderBureauRequirements() {
  const container = document.getElementById('bureauList');
  let html = '<table class="bureau-req-table">';
  html += '<tr><th>铁路局</th><th>考试科目</th></tr>';
  
  for (const [bureau, req] of Object.entries(BUREAU_EXAM_REQUIREMENTS)) {
    html += `<tr>
      <td style="font-weight:600;color:var(--primary)">${bureau}</td>
      <td>${req.subjects.join('、')}</td>
    </tr>`;
  }
  
  html += '</table>';
  container.innerHTML = html;
}

// 渲染内容
function renderContent() {
  const header = document.getElementById('examHeader');
  const content = document.getElementById('examContent');
  
  const cat = EXAM_CATEGORIES.find(c => c.id === currentCategory);
  if (!cat) return;
  
  header.innerHTML = `
    <h2>${cat.icon} ${cat.name}</h2>
    <p>${cat.desc} — 共${cat.questions}题</p>
  `;
  
  const questions = QUESTION_BANK[currentCategory] || [];
  
  if (questions.length === 0) {
    content.innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--text-sub)">
        <div style="font-size:48px;margin-bottom:16px">📚</div>
        <p>该科目题库正在建设中...</p>
        <p style="font-size:12px;margin-top:8px">请先查看"考试概述"了解各局要求</p>
      </div>
    `;
    return;
  }
  
    let html = '<div class="question-list">';
  
  questions.forEach((q, i) => {
    html += `
      <div class="question-card" style="opacity:0;transform:translateY(20px);transition:all 0.4s ease ${i*0.1}s">
        <div class="question-num">第${i+1}题</div>
        <div class="question-text">${q.q}</div>
        ${q.options.length > 0 ? `
          <div class="question-options">
            ${q.options.map((opt, j) => `
              <div class="question-option" onclick="selectOption(this, ${j}, '${q.a}')">${String.fromCharCode(65+j)}. ${opt}</div>
            `).join('')}
          </div>
          <div style="margin-top:12px;padding:12px;background:#f0f7ff;border-radius:6px;display:none" class="answer-box">
            <strong style="color:var(--primary)">✅ 正确答案：</strong>${q.a}
          </div>
        ` : `
          <div style="margin-top:12px;padding:12px;background:#f0f7ff;border-radius:6px">
            <strong style="color:var(--primary)">📖 参考答案：</strong>${q.a}
          </div>
        `}
      </div>
    `;
  });
  
  html += '</div>';
  content.innerHTML = html;
  
  // 触发淡入动画
  setTimeout(() => {
    document.querySelectorAll('.question-card').forEach(card => {
      card.classList.add('show');
    });
  }, 100);
}

// 选择选项
window.selectOption = function(el, index, correctAnswer) {
  const options = el.parentNode.querySelectorAll('.question-option');
  options.forEach(opt => opt.classList.remove('selected'));
  el.classList.add('selected');
  
  const answerBox = el.closest('.question-card').querySelector('.answer-box');
  answerBox.style.display = 'block';
};

// 初始化
init();
</script>

</body>
</html>
