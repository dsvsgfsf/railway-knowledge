:root {
  --primary: #003087;
  --primary-light: #1a4b8c;
  --primary-dark: #001e5a;
  --accent: #c0392b;
  --accent-light: #e74c3c;
  --gold: #f0a500;
  --bg-page: #f0f2f7;
  --bg-card: #ffffff;
  --text-main: #1a1a2e;
  --text-sub: #555;
  --text-light: #888;
  --border: #dde3f0;
  --shadow: 0 4px 20px rgba(0,48,135,.12);
  --radius: 12px;
  --radius-sm: 8px;
  --tier1: linear-gradient(135deg, #f0a500, #ff6b6b);
  --tier2: linear-gradient(135deg, #4facfe, #00f2fe);
  --tier3: linear-gradient(135deg, #667eea, #764ba2);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Microsoft YaHei','PingFang SC',Arial,sans-serif; background: var(--bg-page); color: var(--text-main); }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #edf0f7; }
::-webkit-scrollbar-thumb { background: #b0bbd8; border-radius: 6px; }

/* Header */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 68px;
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
  display: flex; align-items: center; padding: 0 24px;
  box-shadow: 0 2px 12px rgba(0,30,90,.4);
}
#header .back-btn {
  display: flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,.85); font-size: 14px; font-weight: 500;
  padding: 8px 16px; border-radius: 8px; background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2); cursor: pointer;
  transition: all .2s; margin-right: 20px;
}
#header .back-btn:hover { background: rgba(255,255,255,.2); }
#header .logo-area { display: flex; align-items: center; gap: 14px; flex: 1; }
#header .logo-icon { width: 46px; height: 46px; background: rgba(255,255,255,.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
#header .logo-text h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: .5px; }
#header .logo-text p { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 2px; }

/* Main Content */
#main { max-width: 1200px; margin: 0 auto; padding: 88px 24px 48px; }

/* Hero Card */
.hero-card {
  background: var(--bg-card); border-radius: var(--radius); padding: 32px;
  box-shadow: var(--shadow); margin-bottom: 24px; position: relative; overflow: hidden;
}
.hero-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
}
.tier-1 .hero-card::before { background: var(--tier1); }
.tier-2 .hero-card::before { background: var(--tier2); }
.tier-3 .hero-card::before { background: var(--tier3); }

.bureau-header { display: flex; align-items: flex-start; gap: 24px; }
.bureau-avatar {
  width: 80px; height: 80px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; flex-shrink: 0;
}
.tier-1 .bureau-avatar { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
.tier-2 .bureau-avatar { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
.tier-3 .bureau-avatar { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }

.bureau-info { flex: 1; }
.bureau-name { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
.bureau-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
.meta-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}
.tier-badge { background: linear-gradient(135deg, var(--gold), #ff9800); color: #fff; }
.difficulty-badge { background: rgba(192,57,43,.1); color: var(--accent); border: 1px solid rgba(192,57,43,.2); }
.salary-badge { background: rgba(0,48,135,.1); color: var(--primary); border: 1px solid rgba(0,48,135,.2); }
.bureau-location { font-size: 14px; color: var(--text-sub); display: flex; align-items: center; gap: 6px; }

/* Grid Layout */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media(max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* Cards */
.card {
  background: var(--bg-card); border-radius: var(--radius); padding: 24px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.card-title .icon { font-size: 20px; }

/* Info List */
.info-list { display: flex; flex-direction: column; gap: 12px; }
.info-row { display: flex; align-items: flex-start; gap: 12px; }
.info-label { min-width: 100px; font-size: 13px; color: var(--text-light); font-weight: 500; }
.info-value { font-size: 14px; color: var(--text-main); flex: 1; }

/* Salary Section */
.salary-card {
  background: linear-gradient(135deg, var(--primary) 0%, #1565c0 100%);
  color: #fff;
}
.salary-card .card-title { color: #fff; border-bottom-color: rgba(255,255,255,.2); }
.salary-values { display: flex; flex-direction: column; gap: 16px; }
.salary-item { background: rgba(255,255,255,.1); border-radius: var(--radius-sm); padding: 16px; }
.salary-item .label { font-size: 12px; opacity: .8; margin-bottom: 4px; }
.salary-item .value { font-size: 24px; font-weight: 800; }
.salary-item .value small { font-size: 14px; font-weight: 400; opacity: .8; }
.salary-highlight { margin-top: 12px; padding: 12px; background: rgba(255,255,255,.15); border-radius: 8px; font-size: 13px; }

/* Benefits */
.benefits-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.benefit-tag {
  padding: 8px 16px; background: rgba(0,48,135,.06);
  border: 1px solid rgba(0,48,135,.12); border-radius: 20px;
  font-size: 13px; color: var(--primary);
}

/* Lines/Territory */
.lines-list { display: flex; flex-wrap: wrap; gap: 8px; }
.line-tag {
  padding: 6px 12px; background: var(--bg-page); border-radius: 6px;
  font-size: 12px; color: var(--text-sub);
}

/* Departments */
.dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.dept-item {
  padding: 12px; background: var(--bg-page); border-radius: var(--radius-sm);
  text-align: center; font-size: 13px; color: var(--text-main);
  border: 1px solid var(--border);
}

/* Medical Requirements */
.medical-list { display: flex; flex-direction: column; gap: 10px; }
.medical-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; background: #fff5f5; border-radius: 8px;
  border-left: 3px solid var(--accent);
}
.medical-item .icon { font-size: 18px; flex-shrink: 0; }
.medical-item .text { font-size: 13px; color: var(--text-main); }

/* Features */
.features-list { display: flex; flex-direction: column; gap: 10px; }
.feature-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; background: #f0fdf4; border-radius: 8px;
  border-left: 3px solid #22c55e;
}
.feature-item .icon { font-size: 18px; flex-shrink: 0; }
.feature-item .text { font-size: 13px; color: var(--text-main); }

/* Navigation Cards */
.nav-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
.nav-card {
  display: flex; align-items: center; gap: 16px;
  padding: 16px; background: var(--bg-card); border-radius: var(--radius);
  border: 2px solid var(--border); cursor: pointer; transition: all .2s;
}
.nav-card:hover { border-color: var(--primary); box-shadow: var(--shadow); transform: translateY(-2px); }
.nav-card .nav-avatar { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.nav-card .nav-info { flex: 1; }
.nav-card .nav-name { font-size: 15px; font-weight: 700; color: var(--primary); }
.nav-card .nav-meta { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
.nav-card .nav-arrow { font-size: 20px; color: var(--text-light); }

/* Footer */
#footer { text-align: center; padding: 32px 24px; color: var(--text-light); font-size: 12px; }
#footer a { color: var(--primary); }

/* Tier Colors for Comparison */
.tier1-color { color: #f0a500; font-weight: 700; }
.tier2-color { color: #0ea5e9; font-weight: 700; }
.tier3-color { color: #8b5cf6; font-weight: 700; }
</style>

// URL参数解析
function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

// 从内嵌数据获取铁路局数据
function getBureauData(code) {
  return BUREAUS_DATA.find(b => b.code === code) || null;
}

// 获取梯队样式类
function getTierClass(tier) {
  return `tier-${tier}`;
}

// 生成星星难度显示
function getStars(difficulty) {
  return '★'.repeat(difficulty) + '☆'.repeat(5 - difficulty);
}

// 渲染页面
function renderBureau(data) {
  const container = document.getElementById('content');
  
  // 更新body类
  document.body.className = getTierClass(data.tier);
  document.title = `${data.shortName}详情 — 铁路知识智能查询系统`;
  
  // 处理特殊补贴信息
  let specialSalaryInfo = '';
  if (data.salary.subsidies) {
    const subs = data.salary.subsidies;
    const parts = [];
    if (subs.plateauAllowance) parts.push(`高原补贴：${subs.plateauAllowance}`);
    if (subs.borderAllowance) parts.push(`边疆补贴：${subs.borderAllowance}`);
    if (parts.length) specialSalaryInfo = `<div class="salary-highlight">📌 特殊补贴：${parts.join(' | ')}</div>`;
  }
  if (data.salary.features && data.salary.features.length) {
    specialSalaryInfo += `<div class="salary-highlight">⭐ ${data.salary.features.join(' | ')}</div>`;
  }
  
  // 处理体检特殊要求
  let medicalHTML = '';
  if (data.checkupSpecial && data.checkupSpecial.length) {
    medicalHTML = data.checkupSpecial.map(item => `
      <div class="medical-item">
        <span class="icon">⚠️</span>
        <span class="text">${item}</span>
      </div>
    `).join('');
  }
  if (data.medicalNote) {
    medicalHTML += `
      <div class="medical-item" style="background: #fffbeb; border-color: #f59e0b;">
        <span class="icon">📋</span>
        <span class="text">${data.medicalNote}</span>
      </div>
    `;
  }
  
  // 处理管辖线路
  let linesHTML = '';
  if (data.lines && data.lines.length) {
    linesHTML = data.lines.map(line => `<span class="line-tag">${line}</span>`).join('');
  }
  
  // 处理下辖站段
  let deptsHTML = '';
  if (data.departments && data.departments.length) {
    deptsHTML = data.departments.map(dept => `<div class="dept-item">${dept}</div>`).join('');
  }
  
  // 处理福利
  let benefitsHTML = '';
  if (data.benefits && data.benefits.length) {
    benefitsHTML = data.benefits.map(b => `<span class="benefit-tag">${b}</span>`).join('');
  }
  
  // 处理招聘特点
  let featuresHTML = '';
  if (data.features && data.features.length) {
    featuresHTML = data.features.map(f => `
      <div class="feature-item">
        <span class="icon">✓</span>
        <span class="text">${f}</span>
      </div>
    `).join('');
  }
  
  // 获取其他铁路局
  const tierNames = { 1: '第一梯队', 2: '第二梯队', 3: '第三梯队' };
  const otherBureaus = BUREAUS_DATA.filter(b => b.code !== data.code).map(b => {
    const bgClass = b.tier === 1 ? '#fff3e0' : (b.tier === 2 ? '#e3f2fd' : '#f3e5f5');
    return `
      <a href="bureau.html?code=${b.code}" class="nav-card">
        <div class="nav-avatar" style="background: ${bgClass};">🏢</div>
        <div class="nav-info">
          <div class="nav-name">${b.shortName}</div>
          <div class="nav-meta">${tierNames[b.tier]}</div>
        </div>
        <span class="nav-arrow">→</span>
      </a>
    `;
  }).join('');
  
  container.innerHTML = `
    <!-- Hero Card -->
    <div class="hero-card">
      <div class="bureau-header">
        <div class="bureau-avatar">🏢</div>
        <div class="bureau-info">
          <h1 class="bureau-name">${data.name}</h1>
          <div class="bureau-meta">
            <span class="meta-tag tier-badge">${data.tierLabel} · ${data.tierDesc}</span>
            <span class="meta-tag difficulty-badge">${getStars(data.difficulty)} ${data.difficultyLabel}</span>
            <span class="meta-tag salary-badge">💰 ${data.salary.undergraduateMonthly}元/月起</span>
          </div>
          <div class="bureau-location">📍 ${data.headquarters} | ${data.coverage}</div>
        </div>
      </div>
    </div>
    
    <!-- Stats Row -->
    <div class="grid-3" style="margin-bottom: 20px;">
      <div class="card">
        <div class="card-title"><span class="icon">👥</span> 招聘规模</div>
        <div class="info-list">
          <div class="info-row">
            <span class="info-label">年招人数</span>
            <span class="info-value" style="font-size: 18px; font-weight: 700; color: var(--primary);">${data.recruitmentScale}</span>
          </div>
          <div class="info-row">
            <span class="info-label">学历偏好</span>
            <span class="info-value">${data.educationPreference}</span>
          </div>
          <div class="info-row">
            <span class="info-label">专科占比</span>
            <span class="info-value">${data.juniorCollegeRatio}</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">📊</span> 竞争情况</div>
        <div class="info-list">
          <div class="info-row">
            <span class="info-label">竞争比</span>
            <span class="info-value" style="font-size: 18px; font-weight: 700; color: var(--accent);">${data.competitionRatio}</span>
          </div>
          <div class="info-row">
            <span class="info-label">难度等级</span>
            <span class="info-value">${getStars(data.difficulty)} ${data.difficultyLabel}</span>
          </div>
          <div class="info-row">
            <span class="info-label">招聘难度</span>
            <span class="info-value">${data.difficulty}/5</span>
          </div>
        </div>
      </div>
      <div class="card salary-card">
        <div class="card-title"><span class="icon">💰</span> 薪资待遇</div>
        <div class="salary-values">
          <div class="salary-item">
            <div class="label">本科生月薪</div>
            <div class="value">${data.salary.undergraduateMonthly} <small>元</small></div>
          </div>
          <div class="salary-item">
            <div class="label">高铁司机</div>
            <div class="value">${data.salary.highSpeedDriverMonthly} <small>元</small></div>
          </div>
          ${specialSalaryInfo}
        </div>
      </div>
    </div>
    
    <!-- Two Column Layout -->
    <div class="grid-2">
      <div>
        <!-- 基本信息 -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-title"><span class="icon">📋</span> 基本信息</div>
          <div class="info-list">
            <div class="info-row">
              <span class="info-label">总部地址</span>
              <span class="info-value">${data.headquarters}</span>
            </div>
            <div class="info-row">
              <span class="info-label">管辖范围</span>
              <span class="info-value">${data.coverage}</span>
            </div>
            <div class="info-row">
              <span class="info-label">营业里程</span>
              <span class="info-value">${data.mileage}</span>
            </div>
            ${data.altitude ? `
            <div class="info-row">
              <span class="info-label">海拔高度</span>
              <span class="info-value">${data.altitude}</span>
            </div>
            ` : ''}
            ${data.establishedDate ? `
            <div class="info-row">
              <span class="info-label">成立时间</span>
              <span class="info-value">${data.establishedDate}</span>
            </div>
            ` : ''}
            ${data.annualRevenue ? `
            <div class="info-row">
              <span class="info-label">年营收</span>
              <span class="info-value">${data.annualRevenue}</span>
            </div>
            ` : ''}
          </div>
        </div>
        
        <!-- 管辖线路 -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-title"><span class="icon">🛤️</span> 管辖线路</div>
          <div class="lines-list">
            ${linesHTML || '<span class="line-tag">暂无数据</span>'}
          </div>
        </div>
        
        <!-- 福利待遇 -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-title"><span class="icon">🎁</span> 福利待遇</div>
          <div class="benefits-grid">
            ${benefitsHTML || '<span>暂无数据</span>'}
          </div>
        </div>
      </div>
      
      <div>
        <!-- 招聘特点 -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-title"><span class="icon">✨</span> 招聘特点</div>
          <div class="features-list">
            ${featuresHTML || '<span>暂无数据</span>'}
          </div>
        </div>
        
        <!-- 下辖站段 -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-title"><span class="icon">🏭</span> 下辖站段（部分）</div>
          <div class="dept-grid">
            ${deptsHTML || '<span>暂无数据</span>'}
          </div>
        </div>
        
        <!-- 体检特殊要求 -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-title"><span class="icon">🏥</span> 体检特殊要求</div>
          ${medicalHTML || '<p style="color: var(--text-sub);">参照全国通用铁路招聘体检标准</p>'}
        </div>
      </div>
    </div>
    
    <!-- 其他铁路局 -->
    <div class="card">
      <div class="card-title"><span class="icon">🚄</span> 查看其他铁路局</div>
      <div class="nav-cards">
        ${otherBureaus}
      </div>
    </div>
  `;
}

// 初始化
function init() {
  const code = getQueryParam('code');
  if (!code) {
    document.getElementById('content').innerHTML = '<p style="text-align:center; color: var(--text-light); padding: 40px;">未指定铁路局代码</p>';
    return;
  }
  
  const data = getBureauData(code);
  if (data) {
    renderBureau(data);
  } else {
    document.getElementById('content').innerHTML = '<p style="text-align:center; color: var(--accent); padding: 40px;">铁路局数据不存在</p>';
  }
}

init();
</script>
</body>
</html>
